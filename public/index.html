<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Memory Verse</title>
        <link rel="stylesheet" href="index.css" />
    </head>

    <body>
        <main>
            <h3 id="mv-title">Test</h3>
            <button id="setting-btn" type="button">
                <img
                    src="./settings.png"
                    alt="An 8th tooth gear with a wrench going through into the center of the gear."
                    width="40px"
                    height="40px"
                />
            </button>
            <div id="main-display"></div>
            <div id="button-group1">
                <button id="prev-btn" class="switch-btns">Prev</button>
                <button id="show-btn">Show</button>
                <button id="next-btn" class="switch-btns">Next</button>
            </div>
            <input id="quick-entry" placeholder="Genesis 1:1 or GEN 1:1" />
        </main>

        <!--Sidebar-->
        <div id="overlay"></div>
        <aside id="sidebar">
            <input id="main-input" />
        </aside>
        <!----------->
    </body>

    <script type="module" src="./index.js"></script>
</html>
